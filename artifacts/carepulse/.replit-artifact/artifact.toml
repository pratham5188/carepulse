kind = "web"
previewPath = "/"
title = "Health Pulse Care"
version = "1.0.0"
id = "artifacts/carepulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20894

[services.development]
run = "pnpm --filter @workspace/carepulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carepulse", "run", "build" ]
publicDir = "artifacts/carepulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20894"
BASE_PATH = "/"
